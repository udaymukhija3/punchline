services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: punchline
      POSTGRES_PASSWORD: punchline
      POSTGRES_DB: punchline
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
volumes:
  pgdata:
