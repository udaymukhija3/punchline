# Fly.io deployment for PUNCHLINE.
#
# With DATABASE_URL set, room codes are reserved in Postgres with the owning
# Fly machine id. Wrong-machine API/WS hits return Fly-Replay before upgrade so
# Fly can route the request to the room owner. Without DATABASE_URL, keep this
# app at one machine because the registry falls back to memory.

app = "punchline"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  MAX_LOCAL_ROOMS = "500"
  ROOM_IDLE_TTL = "20m"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/readyz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
