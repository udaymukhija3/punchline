# Fly.io deployment for PUNCHLINE.
#
# Production requires Postgres for room ownership and durable active-game
# snapshots. Wrong-machine API/WS hits return Fly-Replay before upgrade so Fly
# can route the request to the current owner.

app = "punchline"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "/app/migrate"

[env]
  PORT = "8080"
  MAX_LOCAL_ROOMS = "500"
  ROOM_IDLE_TTL = "20m"
  ROOM_LEASE_TTL = "90s"
  ROOM_HEARTBEAT_INTERVAL = "15s"
  SHUTDOWN_DRAIN_GRACE = "5s"
  PUNCHLINE_REQUIRE_DATABASE = "true"
  PUNCHLINE_ROOM_CREATE_LIMIT_PER_MIN = "20"
  PUNCHLINE_ROOM_JOIN_LIMIT_PER_MIN = "80"
  PUNCHLINE_WS_CONNECT_LIMIT_PER_MIN = "120"
  PUNCHLINE_WS_MESSAGE_LIMIT_PER_MIN = "240"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/readyz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
